name: PyXIL-BMS MIL Campaign

on:
  push:
    branches: [main, PyMIL, PyHIL]
  pull_request:
    branches: [main]

jobs:
  mil-campaign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run linting (flake8)
        run: |
          pip install flake8
          flake8 framework/ mut/ test_cases/ --max-line-length=100

      - name: Run type checking (mypy)
        run: |
          pip install mypy
          mypy framework/ --ignore-missing-imports

      - name: Run pytest unit tests
        run: |
          pip install pytest pytest-cov
          pytest tests/unit/ --cov=framework --cov-report=xml --cov-report=html

      - name: Run MIL test campaign
        run: python run_campaign.py

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        with:
          name: mil-campaign-report
          path: reports/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
